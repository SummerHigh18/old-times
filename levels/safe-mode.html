<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="safe-mode.css">
    <title>Safe Boot</title>
    <!-- Source code is the first place you would(and should) look in an ARG puzzle! -->
</head>
<body>

    <div id="login-window">
        <div id="titlebar">
            <p>Login (Safe mode)</p>
        </div>
        <div id="window-content">
            <div id="username">
                <label for="user">Username:</label>
                <input type="text" id="user">
            </div>

            <div id="password">
                <label for="pass">Password:</label>
                <input type="text" id="pass">
            </div>
            <div class="btn">
                <button id="login-btn">Login</button>
            </div>
            <p id="forgot">Forgot Password?</p>
        </div>
    </div>
    <script src="safe-mode.js"></script>
</body>
</html>
