<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    
    <title>Old-Times 95</title>
</head>
<body>
    <div id="taskbar">
        <button id="start-btn">
            <img src="./assets/images/Start-pressed.png" alt="Start">
        </button>
        <div id="task-buttons"></div>
        <div id="date-time">10:36 PM</div >
    </div>
    <div id="window">
        <div id="titlebar">
            <p>Window</p>
            <div>
                <button class="window-btn" id="minimize-btn"><img src="./assets/images/Window Button.png" alt=""></button>
                <button class="window-btn" id="maximize-btn"><img src="./assets/images/Window Button-1.png" alt=""></button>
                <button class="window-btn" id="close-btn"><img src="./assets/images/Window Button-2.png" alt=""></button>
            </div>
        </div>
        <div id="window-content">
            <p>meow my name is kitty</p>
        </div>
    </div>




    <script src="script.js"></script>
</body>
</html>
